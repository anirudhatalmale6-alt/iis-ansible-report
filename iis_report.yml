---
# Ansible Playbook: IIS Website & Binding Report
# Connects to Windows servers via WinRM, queries IIS, generates a CSV report,
# and pushes the report to an Azure DevOps Git repository.
#
# Usage:
#   ansible-playbook -i inventory.yml iis_report.yml
#
# Required variables (set in inventory.yml or passed via --extra-vars):
#   azure_pat          - Azure DevOps Personal Access Token
#   azure_repo_url     - Azure DevOps repo URL (e.g. https://dev.azure.com/org/project/_git/repo)
#   azure_repo_branch  - Branch to push to (default: main)
#   csv_filename       - Name of the CSV file in the repo (default: iis_report.csv)
#
# Requirements:
#   - WinRM configured on target Windows servers
#   - IIS installed on target servers
#   - No additional Ansible collections required (uses built-in win_shell module)
#   - git installed on the Ansible controller

- name: Gather IIS website and binding information
  hosts: iis_servers
  gather_facts: false

  tasks:
    - name: Gather Windows hostname and IP addresses
      win_shell: |
        $hostname = $env:COMPUTERNAME
        $ips = (Get-NetIPAddress -AddressFamily IPv4 |
                Where-Object { $_.IPAddress -ne '127.0.0.1' -and $_.PrefixOrigin -ne 'WellKnown' } |
                Select-Object -ExpandProperty IPAddress) -join ';'
        [PSCustomObject]@{
          Hostname = $hostname
          IPs      = $ips
        } | ConvertTo-Json -Compress
      register: server_info_raw

    - name: Parse server info
      ansible.builtin.set_fact:
        server_info: "{{ server_info_raw.stdout | from_json }}"

    - name: Gather IIS site and binding details
      win_shell: |
        Import-Module WebAdministration

        $sites = Get-ChildItem IIS:\Sites
        $results = @()

        foreach ($site in $sites) {
            $bindings = Get-WebBinding -Name $site.Name
            if ($bindings.Count -eq 0) {
                $results += [PSCustomObject]@{
                    SiteName     = $site.Name
                    SiteID       = $site.ID
                    State        = $site.State
                    Protocol     = ''
                    BindingIP    = ''
                    Port         = ''
                    HostHeader   = ''
                    PhysicalPath = $site.PhysicalPath
                }
            }
            else {
                foreach ($binding in $bindings) {
                    $info = $binding.bindingInformation -split ':'
                    $bindIP   = if ($info[0] -eq '*') { 'All Unassigned' } else { $info[0] }
                    $port     = $info[1]
                    $hostHdr  = $info[2]

                    $results += [PSCustomObject]@{
                        SiteName     = $site.Name
                        SiteID       = $site.ID
                        State        = $site.State
                        Protocol     = $binding.protocol
                        BindingIP    = $bindIP
                        Port         = $port
                        HostHeader   = $hostHdr
                        PhysicalPath = $site.PhysicalPath
                    }
                }
            }
        }

        $results | ConvertTo-Json -Depth 3 -Compress
      register: iis_data_raw

    - name: Parse IIS data
      ansible.builtin.set_fact:
        iis_sites: "{{ iis_data_raw.stdout | from_json | default([]) }}"

    - name: Normalize single-object result to list
      ansible.builtin.set_fact:
        iis_sites: "{{ [iis_sites] if iis_sites is mapping else iis_sites }}"

    - name: Build per-host report rows
      ansible.builtin.set_fact:
        host_rows: >-
          {%- set rows = [] -%}
          {%- for site in iis_sites -%}
            {%- set _ = rows.append({
              'Server': server_info.Hostname,
              'ServerIPs': server_info.IPs,
              'SiteName': site.SiteName,
              'SiteID': site.SiteID | string,
              'Status': site.State | default('Unknown'),
              'Protocol': site.Protocol | default(''),
              'BindingIP': site.BindingIP | default(''),
              'Port': site.Port | default(''),
              'HostHeader': site.HostHeader | default(''),
              'PhysicalPath': site.PhysicalPath | default('')
            }) -%}
          {%- endfor -%}
          {{ rows }}

- name: Generate CSV report
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    report_dir: "/tmp/iis_report_workspace"
    csv_filename: "{{ csv_filename | default('iis_report.csv') }}"
    report_file: "{{ report_dir }}/{{ csv_filename }}"
    csv_headers: "Server,Server IPs,Site Name,Site ID,Status,Protocol,Binding IP,Port,Host Header,Physical Path"
    azure_repo_branch: "{{ azure_repo_branch | default('main') }}"

  tasks:
    - name: Ensure report directory exists
      ansible.builtin.file:
        path: "{{ report_dir }}"
        state: directory
        mode: '0755'

    - name: Collect all host rows
      ansible.builtin.set_fact:
        all_rows: >-
          {%- set combined = [] -%}
          {%- for host in groups['iis_servers'] -%}
            {%- for row in hostvars[host]['host_rows'] | default([]) -%}
              {%- set _ = combined.append(row) -%}
            {%- endfor -%}
          {%- endfor -%}
          {{ combined }}

    - name: Write CSV header
      ansible.builtin.copy:
        content: "{{ csv_headers }}\n"
        dest: "{{ report_file }}"
        mode: '0644'

    - name: Append data rows to CSV
      ansible.builtin.lineinfile:
        path: "{{ report_file }}"
        line: >-
          "{{ item.Server }}","{{ item.ServerIPs }}","{{ item.SiteName }}","{{ item.SiteID }}","{{ item.Status }}","{{ item.Protocol }}","{{ item.BindingIP }}","{{ item.Port }}","{{ item.HostHeader }}","{{ item.PhysicalPath }}"
        insertafter: EOF
      loop: "{{ all_rows }}"
      loop_control:
        label: "{{ item.Server }} - {{ item.SiteName }}"

    - name: Display report summary
      ansible.builtin.debug:
        msg: "CSV report generated: {{ report_file }} ({{ all_rows | length }} rows from {{ groups['iis_servers'] | length }} server(s))"

- name: Push CSV report to Azure DevOps Repo
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    report_dir: "/tmp/iis_report_workspace"
    csv_filename: "{{ csv_filename | default('iis_report.csv') }}"
    report_file: "{{ report_dir }}/{{ csv_filename }}"
    azure_repo_branch: "{{ azure_repo_branch | default('main') }}"
    azure_clone_dir: "/tmp/azure_iis_repo"

  tasks:
    - name: Validate Azure DevOps variables
      ansible.builtin.assert:
        that:
          - azure_pat is defined and azure_pat | length > 0
          - azure_repo_url is defined and azure_repo_url | length > 0
        fail_msg: >
          Missing required variables. Please set 'azure_pat' and 'azure_repo_url'
          in inventory.yml or pass via --extra-vars.

    - name: Build authenticated Azure repo URL
      ansible.builtin.set_fact:
        azure_auth_url: "{{ azure_repo_url | regex_replace('https://', 'https://pat:' + azure_pat + '@') }}"

    - name: Remove previous clone directory if it exists
      ansible.builtin.file:
        path: "{{ azure_clone_dir }}"
        state: absent

    - name: Clone Azure DevOps repository
      ansible.builtin.git:
        repo: "{{ azure_auth_url }}"
        dest: "{{ azure_clone_dir }}"
        version: "{{ azure_repo_branch }}"
        force: true
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Copy CSV report into the cloned repo
      ansible.builtin.copy:
        src: "{{ report_file }}"
        dest: "{{ azure_clone_dir }}/{{ csv_filename }}"
        mode: '0644'

    - name: Configure git user for commit
      ansible.builtin.shell: |
        cd "{{ azure_clone_dir }}"
        git config user.email "ansible@automation.local"
        git config user.name "Ansible IIS Reporter"
      changed_when: false

    - name: Stage, commit, and push CSV to Azure DevOps
      ansible.builtin.shell: |
        cd "{{ azure_clone_dir }}"
        git add "{{ csv_filename }}"

        # Check if there are changes to commit
        if git diff --cached --quiet; then
          echo "NO_CHANGES"
        else
          git commit -m "Update IIS report - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin "{{ azure_repo_branch }}"
          echo "PUSHED"
        fi
      register: git_push_result
      changed_when: "'PUSHED' in git_push_result.stdout"
      environment:
        GIT_TERMINAL_PROMPT: "0"

    - name: Display push result
      ansible.builtin.debug:
        msg: >-
          {% if 'PUSHED' in git_push_result.stdout %}
          CSV report successfully pushed to Azure DevOps: {{ azure_repo_url }} (branch: {{ azure_repo_branch }})
          {% else %}
          No changes detected — CSV in Azure repo is already up to date.
          {% endif %}

    - name: Clean up clone directory
      ansible.builtin.file:
        path: "{{ azure_clone_dir }}"
        state: absent
